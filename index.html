<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <script src="v86.js"></script>

    <style>
        body {
            background: #000;
            color: #ccc;
            margin: 0;
            font-family: Consolas, monospace;
        }

        #screen {
            width: 800px;
            height: 600px;
            border: 2px solid #333;
            background: #000;
            image-rendering: pixelated;
            margin: 20px auto;
        }

        #banner {
            text-align: center;
            color: #ccc;
            font-family: Consolas, monospace;
            margin-top: 10px;
            font-size: 14px;
        }

        #banner a {
            color: #0f0;
            text-decoration: none;
        }

        #banner a:hover {
            text-decoration: underline;
        }
        #container {
            width: 800px;
            margin: 20px auto;
        }


    </style>
</head>
<body>
    <div id="banner">
        Made with v86!<br>
        If it stays blank for a second, it's just loading!<br><br>
        Check out the repo for Monolith 
        <a href="https://github.com/bbqsauce3000/Monolith" target="_blank">here</a>, 
        and the v86 website 
        <a href="https://copy.sh/v86/" target="_blank">here</a>!
    </div>

    <div id="screen"></div>

    <script>
        var emulator = new V86({
            wasm_path: "v86.wasm",
            memory_size: 128 * 1024 * 1024,
            vga_memory_size: 8 * 1024 * 1024,
            screen_container: document.getElementById("screen"),

            bios: { url: "seabios.bin" },
            vga_bios: { url: "vgabios.bin" },

            cdrom: { url: "monolith.iso" },

            autostart: true
        });
    </script>
</body>
</html>
